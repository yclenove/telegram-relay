server:
  listen_addr: ":8780"

security:
  level: "medium"
  timestamp_skew_sec: 300
  rate_limit_per_second: 20
  rate_limit_burst: 40

telegram:
  parse_mode: "HTML"
  api_base_url: "https://api.telegram.org"
  timeout_sec: 5

retry:
  max_attempts: 3
  initial_backoff_ms: 300
  max_backoff_ms: 3000

database:
  dsn: "postgres://postgres:postgres@127.0.0.1:5432/telegram?sslmode=disable"

auth:
  access_token_ttl_min: 60
  refresh_token_ttl_min: 1440
  bootstrap_username: "admin"

worker:
  poll_interval_ms: 1000
  batch_size: 20

web:
  admin_static_dir: ""
