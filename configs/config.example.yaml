server:
  listen_addr: ":8780"

security:
  level: "basic" # basic | medium | strict
  token: "replace-with-strong-token"
  hmac_secret: "replace-with-hmac-secret"
  timestamp_skew_sec: 300
  ip_whitelist:
    - "1.2.3.4"
    - "5.6.7.8"
  rate_limit_per_second: 20
  rate_limit_burst: 40

telegram:
  bot_token: "123456:replace-with-bot-token"
  chat_id: "-1001234567890"
  parse_mode: "HTML"
  api_base_url: "https://api.telegram.org"
  timeout_sec: 5

retry:
  max_attempts: 3
  initial_backoff_ms: 300
  max_backoff_ms: 3000

database:
  dsn: "postgres://postgres:postgres@127.0.0.1:5432/telegram?sslmode=disable"

auth:
  jwt_secret: "replace-with-jwt-secret"
  access_token_ttl_min: 60
  refresh_token_ttl_min: 1440
  bootstrap_username: "admin"
  bootstrap_password: "replace-with-admin-password"

worker:
  poll_interval_ms: 1000
  batch_size: 20

web:
  # 管理台见独立仓库 telegram-relay-admin，npm run build 后将 dist 路径填于此；留空则不提供静态页
  admin_static_dir: ""
