services:
  postgres:
    image: postgres:16
    container_name: telegram-relay-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=telegram_relay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  telegram-relay:
    build:
      context: ..
      dockerfile: Dockerfile
    image: telegram-relay:latest
    container_name: telegram-relay
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - LISTEN_ADDR=:8080
      - DATABASE_DSN=postgres://postgres:postgres@postgres:5432/telegram_relay?sslmode=disable
      - SECURITY_LEVEL=medium
      - AUTH_TOKEN=replace-with-strong-token
      - HMAC_SECRET=replace-with-hmac-secret
      - TIMESTAMP_SKEW_SEC=300
      - RATE_LIMIT_PER_SECOND=20
      - RATE_LIMIT_BURST=40
      - TELEGRAM_BOT_TOKEN=replace-with-bot-token
      - TELEGRAM_CHAT_ID=-1001234567890
      - TELEGRAM_PARSE_MODE=HTML
      - TELEGRAM_API_BASE_URL=https://api.telegram.org
      - TELEGRAM_TIMEOUT_SEC=5
      - RETRY_MAX_ATTEMPTS=3
      - RETRY_INITIAL_BACKOFF_MS=300
      - RETRY_MAX_BACKOFF_MS=3000
      - JWT_SECRET=replace-with-jwt-secret
      - BOOTSTRAP_USERNAME=admin
      - BOOTSTRAP_PASSWORD=replace-with-admin-password
      - WORKER_POLL_INTERVAL_MS=1000
      - WORKER_BATCH_SIZE=20
      # 管理台为独立仓库构建，需要时在宿主机挂载 dist 后设置 ADMIN_STATIC_DIR
    depends_on:
      - postgres

volumes:
  postgres_data:
